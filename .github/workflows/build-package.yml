name: Build Pacman Package

on:
  workflow_dispatch:
    inputs:
      package-name:
        description: "Name of the package"
        required: true
        type: string
      flutter:
        description: "Install Flutter for build"
        required: false
        type: boolean
        default: false
      channel:
        description: "Target channel: dev | testing | stable"
        required: false
        type: string
        default: "dev"
  workflow_call:
    inputs:
      package-name:
        description: "Name of the package"
        required: true
        type: string
      flutter:
        description: "Install Flutter for build"
        required: false
        type: boolean
        default: false
      channel:
        description: "Target channel: dev | testing | stable"
        required: false
        type: string
        default: "dev"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v4

      - name: Get channel
        id: channel
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            CHANNEL="${TAG%%-v*}"
          fi
          
          CHANNEL="${CHANNEL:-${{ inputs.channel }}}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Build package inside Arch container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest /bin/bash -c "
            useradd -m builder
            passwd -d builder

            pacman -Syu --noconfirm
            pacman -S --needed --noconfirm \
              base-devel git meson gtk3 adwaita-fonts \
              arch-install-scripts fakeroot pkgconf sudo rsync

            if [ '${{ inputs.flutter }}' = 'true' ]; then
              pacman -S --needed --noconfirm unzip curl clang cmake ninja
              curl -fL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz -o flutter.tar.xz
              tar -xf flutter.tar.xz
              mv flutter /opt/flutter
              chown -R builder:builder /opt/flutter
            fi

            pacman -Scc --noconfirm
            echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

            su - builder -c '
              set -e
              export PATH=/opt/flutter/bin:\$PATH
              FLUTTER=${{ inputs.flutter }}
              CHANNEL=${{ steps.channel.outputs.channel }}

              mkdir -p /home/builder/build
              rsync -a --exclude=\".git\" /workspace/ /home/builder/build/
              cd /home/builder/build

              if [ \"\$FLUTTER\" = \"true\" ]; then
                flutter precache --linux
              fi

              makepkg -sf --noconfirm
              sudo cp ./*.pkg.tar.* /workspace/
            '
          "

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}
          path: ./*.pkg.tar.*

      - name: Checkout binary repo
        uses: actions/checkout@v4
        with:
          repository: JappeOS/jappeos-repo
          token: ${{ secrets.JAPPEOS_ORG_PAT }}
          ref: gh-pages
          path: jappeos-repo

      - name: Add package to channel
        if: steps.channel.outputs.channel != 'none'
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"
          case "$CHANNEL" in
            stable)  DB_NAME="jappeos" ;;
            testing) DB_NAME="jappeos-testing" ;;
            dev)     DB_NAME="jappeos-dev" ;;
            *)       echo "Unknown channel: $CHANNEL"; exit 1 ;;
          esac

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/jappeos-repo:/repo \
            archlinux:latest /bin/bash -c "
              pacman -Syu --needed --noconfirm pacman-contrib
              mkdir -p /repo/$CHANNEL
              cp /workspace/*.pkg.tar.* /repo/$CHANNEL/
              cd /repo/$CHANNEL
              # -R removes old versions of the same package from the DB
              repo-add -R ${DB_NAME}.db.tar.gz *.pkg.tar.*
            "

      - name: Commit and push (with retry for concurrent builds)
        if: steps.channel.outputs.channel != 'none'
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"

          cd jappeos-repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            # Pull before each attempt so we rebase onto latest DB state
            git fetch origin gh-pages
            git rebase origin/gh-pages

            # Re-run repo-add after rebase so the DB reflects any concurrent additions
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              -v ${{ github.workspace }}/jappeos-repo:/repo \
              archlinux:latest /bin/bash -c "
                pacman -Syu --needed --noconfirm pacman-contrib
                cd /repo/$CHANNEL
                repo-add -R ${DB_NAME}.db.tar.gz *.pkg.tar.*
              " 2>/dev/null

            git add "$CHANNEL/"
            git commit -m "[$CHANNEL] Update ${{ inputs.package-name }}" || true

            git push && break

            echo "Push attempt $i/5 failed - retrying in $((i * 3))s..."
            git reset HEAD~1 2>/dev/null || true
            sleep $((i * 3))
          done
