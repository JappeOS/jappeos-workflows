name: Build Pacman Package

on:
  workflow_dispatch:
    inputs:
      package-name:
        description: "Name of the package"
        required: true
        type: string
      flutter:
        description: "Install Flutter for build"
        required: false
        type: boolean
        default: false
      flutter-version:
        description: "Flutter version for build"
        required: false
        type: string
        default: "3.41.4"
      channel:
        description: "Target channel: dev | testing | stable | all | none"
        required: false
        type: string
        default: "dev"
      commit-sha:
        required: false
        type: string
  workflow_call:
    inputs:
      package-name:
        description: "Name of the package"
        required: true
        type: string
      flutter:
        description: "Install Flutter for build"
        required: false
        type: boolean
        default: false
      flutter-version:
        description: "Flutter version for build"
        required: false
        type: string
        default: "3.41.4"
      channel:
        description: "Target channel: dev | testing | stable | all | none"
        required: false
        type: string
        default: "dev"
      commit-sha:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit-sha }}
          fetch-depth: 0

      - name: Get channel
        id: channel
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            CHANNEL="${TAG%%-v*}"
          fi

          CHANNEL="${CHANNEL:-${{ inputs.channel }}}"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Build package inside Arch container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest /bin/bash -c "
            useradd -m builder
            passwd -d builder

            pacman -Syu --noconfirm
            pacman -S --needed --noconfirm \
              base-devel git meson gtk3 adwaita-fonts \
              arch-install-scripts fakeroot pkgconf sudo rsync

            if [ '${{ inputs.flutter }}' = 'true' ]; then
              pacman -S --needed --noconfirm unzip curl clang cmake ninja
              curl -fL 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${{ inputs.flutter-version }}-stable.tar.xz' -o flutter.tar.xz
              tar -xf flutter.tar.xz
              mv flutter /opt/flutter
              chown -R builder:builder /opt/flutter
            fi

            pacman -Scc --noconfirm
            echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

            su - builder -c '
              set -e
              export PATH=/opt/flutter/bin:\$PATH
              FLUTTER=${{ inputs.flutter }}
              CHANNEL=${{ steps.channel.outputs.channel }}

              mkdir -p /home/builder/build
              rsync -a --exclude=\".git\" /workspace/ /home/builder/build/
              cd /home/builder/build

              if [ \"\$FLUTTER\" = \"true\" ]; then
                flutter precache --linux
              fi

              which dart
              dart --version
              dart --disable-analytics --version
              flutter --version

              makepkg -sf --noconfirm
              sudo cp ./*.pkg.tar.* /workspace/
            '
          "

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package-name }}
          path: ./*.pkg.tar.*

      - name: Checkout binary repo
        uses: actions/checkout@v4
        with:
          repository: JappeOS/jappeos-repo
          token: ${{ secrets.JAPPEOS_ORG_PAT }}
          ref: gh-pages
          path: jappeos-repo

      - name: Add package to channel(s)
        if: steps.channel.outputs.channel != 'none'
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"

          if [ "$CHANNEL" = "all" ]; then
            CHANNELS="dev testing stable"
          else
            CHANNELS="$CHANNEL"
          fi

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/jappeos-repo:/repo \
            archlinux:latest /bin/bash -c "
              pacman -Syu --needed --noconfirm pacman-contrib
              for CH in $CHANNELS; do
                case \"\$CH\" in
                  stable)  DB_NAME=jappeos ;;
                  testing) DB_NAME=jappeos-testing ;;
                  dev)     DB_NAME=jappeos-dev ;;
                  *)       echo \"Unknown channel: \$CH\"; exit 1 ;;
                esac
                mkdir -p /repo/\$CH
                
                # Pre-delete any old versions of the packages we're about to add.
                # rm -f is safe here even if the old file is already missing (handles the
                # already-corrupted state where a previous run committed files but not the DB).
                for pkg in /workspace/*.pkg.tar.*; do
                  pkgname=\$(bsdtar -xOf \"\$pkg\" .PKGINFO 2>/dev/null | sed -n 's/^pkgname = //p')
                  [ -n \"\$pkgname\" ] && rm -f /repo/\$CH/\${pkgname}-*.pkg.tar.*
                done
                cp /workspace/*.pkg.tar.* /repo/\$CH/
                cd /repo/\$CH
                # Pass only the new packages, not the whole dir, so old versions
                # aren't fed back into repo-add. Drop -R since we already cleaned up above.
                repo-add \${DB_NAME}.db.tar.gz /workspace/*.pkg.tar.*
              done
              chown -R $(id -u):$(id -g) /repo
            "

      - name: Commit and push (with retry for concurrent builds)
        if: steps.channel.outputs.channel != 'none'
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"

          if [ "$CHANNEL" = "all" ]; then
            CHANNELS="dev testing stable"
          else
            CHANNELS="$CHANNEL"
          fi

          cd jappeos-repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            # Discard working tree changes from the previous step (or prior attempt)
            # so rebase can proceed cleanly. Packages are re-copied by docker below.
            git reset --hard HEAD
            git clean -fd

            # Pull before each attempt so we rebase onto latest DB state
            git fetch origin gh-pages
            git rebase origin/gh-pages

            # Re-copy packages and re-run repo-add after rebase so the DB
            # reflects our package and any concurrent additions
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              -v ${{ github.workspace }}/jappeos-repo:/repo \
              archlinux:latest /bin/bash -c "
                pacman -Syu --needed --noconfirm pacman-contrib
                for CH in $CHANNELS; do
                  case \"\$CH\" in
                    stable)  DB_NAME=jappeos ;;
                    testing) DB_NAME=jappeos-testing ;;
                    dev)     DB_NAME=jappeos-dev ;;
                  esac
                  mkdir -p /repo/\$CH
                  
                  # Pre-delete any old versions of the packages we're about to add.
                  # rm -f is safe here even if the old file is already missing (handles the
                  # already-corrupted state where a previous run committed files but not the DB).
                  for pkg in /workspace/*.pkg.tar.*; do
                    pkgname=\$(bsdtar -xOf \"\$pkg\" .PKGINFO 2>/dev/null | sed -n 's/^pkgname = //p')
                    [ -n \"\$pkgname\" ] && rm -f /repo/\$CH/\${pkgname}-*.pkg.tar.*
                  done
                  cp /workspace/*.pkg.tar.* /repo/\$CH/
                  cd /repo/\$CH
                  # Pass only the new packages, not the whole dir, so old versions
                  # aren't fed back into repo-add. Drop -R since we already cleaned up above.
                  repo-add \${DB_NAME}.db.tar.gz /workspace/*.pkg.tar.*
                done
                chown -R $(id -u):$(id -g) /repo
              " 2>/dev/null

            for CH in $CHANNELS; do
              git add "$CH/"
            done
            git commit -m "[$CHANNEL] Update ${{ inputs.package-name }}" || true

            git push && break

            echo "Push attempt $i/5 failed - retrying in $((i * 3))s..."
            git reset HEAD~1 2>/dev/null || true
            sleep $((i * 3))
          done
