name: Release (flutter)

on:
  workflow_call:

jobs:
  sync-and-tag:
    name: Sync PKGBUILD and create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.JAPPEOS_ORG_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml \
            | sed 's/version:[[:space:]]*//' \
            | sed 's/+.*//' \
            | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          CHANNEL="${{ github.ref_name }}"
          TAG="${CHANNEL}-v${{ steps.version.outputs.version }}"
          
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/"        PKGBUILD

      - name: Commit and push updated PKGBUILD
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "chore: sync PKGBUILD to v$VERSION [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create and push version tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          CHANNEL="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${CHANNEL}-v${VERSION}"
          
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
