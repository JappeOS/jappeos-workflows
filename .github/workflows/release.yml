name: Release

on:
  workflow_call:
    outputs:
      commit-sha:
        description: "SHA of the commit that was tagged"
        value: ${{ jobs.sync-and-tag.outputs.commit-sha }}

jobs:
  sync-and-tag:
    name: Sync PKGBUILD and create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      commit-sha: ${{ steps.commit.outputs.sha }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.JAPPEOS_ORG_PAT }}
          fetch-depth: 0

      - name: Extract version from PKGBUILD
        id: version
        run: |
          REAL_PKGBUILD=$(readlink -f PKGBUILD)

          VERSION=$(grep '^pkgver=' "$REAL_PKGBUILD" \
            | sed 's/pkgver=//' \
            | tr -d '[:space:]')
          PKGREL=$(grep '^pkgrel=' "$REAL_PKGBUILD" \
            | sed 's/pkgrel=//' \
            | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION-$PKGREL"

      - name: Get tag
        id: tag
        run: |
          CHANNEL="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          PKGREL="${{ steps.version.outputs.pkgrel }}"
          TAG="${CHANNEL}-v${VERSION}-${PKGREL}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          REAL_PKGBUILD=$(readlink -f PKGBUILD)
          TAG="${{ steps.tag.outputs.tag }}"
          sed -i "s/^_tag=.*/_tag=$TAG/" "$REAL_PKGBUILD"
          # pkgrel is intentionally left as-is: the developer sets it explicitly

      - name: Commit and push updated PKGBUILD
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$(git rev-parse --show-toplevel)"
          git diff --staged --quiet || git commit -m "chore: sync PKGBUILD to v$VERSION [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
          git fetch origin
          git checkout "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Create and push version tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push https://x-access-token:${{ secrets.JAPPEOS_ORG_PAT }}@github.com/${{ github.repository }}.git "$TAG"

      - name: Output commit SHA
        id: commit
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git fetch origin "refs/tags/$TAG"
          SHA=$(git rev-list -n 1 "$TAG")
          echo "Outputting commit SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
