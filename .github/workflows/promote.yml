name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      package-name:
        description: "Package to promote"
        required: true
        type: string
      version:
        description: "Version to promote"
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout binary repo
        uses: actions/checkout@v4
        with:
          repository: JappeOS/jappeos-repo
          token: ${{ secrets.JAPPEOS_ORG_PAT }}
          ref: gh-pages

      - name: Copy package from testing to stable
        run: |
          PKG="${{ inputs.package-name }}"
          VER="${{ inputs.version }}"

          PKGFILE=$(find testing/ -name "${PKG}-${VER}-*.pkg.tar.*" | head -1)

          if [ -z "$PKGFILE" ]; then
            echo "ERROR: No package matching ${PKG}-${VER}-* found in testing/"
            exit 1
          fi

          echo "Promoting: $PKGFILE"

          docker run --rm -v "$PWD:/repo" archlinux:latest /bin/bash -c "
            pacman -Syu --needed --noconfirm pacman-contrib
            mkdir -p /repo/stable
            cp /repo/$PKGFILE /repo/stable/
            cd /repo/stable
            repo-add -R jappeos.db.tar.gz *.pkg.tar.*
          "

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stable/
          git commit -m "[stable] Promote ${{ inputs.package-name }} ${{ inputs.version }}"
          git push
